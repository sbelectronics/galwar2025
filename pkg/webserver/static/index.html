<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galactic Warzone</title>
<link rel="stylesheet" href="/static/xterm.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #ccc;
               font-family: "Consolas", "Courier New", monospace; }
  #login { display: none; text-align: center; padding-top: 20vh; }
  #login h1 { color: #5f5; letter-spacing: 0.3em; }
  #login a { display: inline-block; margin-top: 2em; padding: 0.8em 2em;
             background: #14330f; color: #5f5; border: 1px solid #5f5;
             text-decoration: none; font-size: 1.1em; }
  #login a:hover { background: #1e4d17; }
  #terminal { height: 100%; display: none; }
</style>
</head>
<body>
<div id="login">
  <h1>GALACTIC WARZONE</h1>
  <p>A 1986 BBS door game, reporting for duty.</p>
  <a id="googlebtn" href="/auth/login">Sign in with Google</a>
  <p id="devhint" style="display:none; color:#666">dev mode: /auth/dev?user=you@example.com</p>
</div>
<div id="terminal"></div>
<script src="/static/xterm.js"></script>
<script src="/static/addon-fit.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
